version: 2

updates:
  # npm — frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    assignees:
      - "Maki-Zeninn"
    reviewers:
      - "Maki-Zeninn"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # Cargo — smart-contract
  - package-ecosystem: "cargo"
    directory: "/smart-contract"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    assignees:
      - "Maki-Zeninn"
    reviewers:
      - "Maki-Zeninn"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    assignees:
      - "Maki-Zeninn"
    reviewers:
      - "Maki-Zeninn"
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(actions)"
